<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MiljenTTS OBS</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
        background: transparent;
        color: transparent;
      }

      body {
        width: 100vw;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      #status {
        position: fixed;
        left: 8px;
        bottom: 8px;
        color: rgba(255, 255, 255, 0.01);
        font-size: 1px;
      }

      #click-hint {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 1.1rem;
        cursor: pointer;
        user-select: none;
      }

      #click-hint.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="status">MiljenTTS OBS ready</div>
    <div id="click-hint" class="hidden">Click to enable audio</div>
    <audio id="player"></audio>
    <script src="/obs.js" type="module"></script>
  </body>
</html>
