<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MiljenTTS</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel" aria-labelledby="title">
        <div class="topbar">
          <div>
            <h1 id="title">MiljenTTS</h1>
            <p id="status" class="status">Подключение...</p>
          </div>
          <div class="actions">
            <button id="test" type="button" class="secondary">Тест</button>
            <button id="clear" type="button" class="secondary">Очистить</button>
            <button id="toggle" type="button">Пауза</button>
          </div>
        </div>

        <div class="obs-url">
          <span>OBS Browser Source</span>
          <strong id="obs-url">http://localhost:3000</strong>
        </div>

        <div class="command-hint">
          <span>Команда для чата</span>
          <strong id="tts-command">!tts текст сообщения</strong>
        </div>

        <div class="controls">
          <label>
            Голос
            <select id="voice"></select>
          </label>
          <label>
            Громкость
            <span class="value" id="volume-value">100%</span>
            <input id="volume" type="range" min="0" max="1" step="0.05" value="1" />
          </label>
          <label>
            Скорость
            <span class="value" id="rate-value">1.00x</span>
            <input id="rate" type="range" min="0.7" max="1.4" step="0.05" value="1" />
          </label>
          <label>
            Тон
            <span class="value" id="pitch-value">1.00</span>
            <input id="pitch" type="range" min="0.7" max="1.3" step="0.05" value="1" />
          </label>
        </div>

        <div class="now">
          <span>Сейчас</span>
          <strong id="current">ожидаю сообщения</strong>
        </div>

        <ol id="log" class="log" aria-label="Последние сообщения"></ol>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
